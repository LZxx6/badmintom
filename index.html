<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林丹宿舍杯 - 云同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ================= 主题变量与 CSS (完全保留之前的精美设计) ================= */
        :root {
            --bg-color: #F8F6F4; --card-bg: #FFFFFF; --primary-yellow: #FFC107;
            --btn-dark: #1A1C29; --text-main: #333333; --text-muted: #888888;
            --border-color: #EEEEEE; --hover-bg: #F0F0F0; --modal-bg: #FFFFFF;
            --input-bg: #FFFFFF; --input-border: #DDDDDD; --list-bg: #F9F9F9;
            --rank-bg: #F0F0F0; --rank-text: #666666; --chart-grid: #EAEAEA;
            --border-radius: 20px;
        }
        [data-theme="dark"] {
            --bg-color: #121212; --card-bg: #1E1E1E; --btn-dark: #333652;
            --text-main: #EFEFEF; --text-muted: #A0A0A0; --border-color: #333333;
            --hover-bg: #2A2A2A; --modal-bg: #1E1E1E; --input-bg: #2C2C2C;
            --input-border: #444444; --list-bg: #252525; --rank-bg: #333333;
            --rank-text: #AAAAAA; --chart-grid: #444444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 80px; background-color: var(--card-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 20px 0; position: relative; z-index: 10;}
        .logo { font-weight: bold; font-size: 14px; line-height: 1.4; margin-bottom: 25px; color: var(--text-main); text-align: center; }
        .season-btn { width: 56px; height: 50px; border-radius: 12px; background: var(--hover-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; margin-bottom: 20px; border: 1px solid var(--border-color); color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .season-year { font-size: 14px; font-weight: bold; color: var(--primary-yellow); }
        .season-lbl { font-size: 10px; color: var(--text-muted); }
        .nav-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; cursor: pointer; color: var(--text-muted); }
        .add-btn { position: absolute; bottom: 100px; width: 48px; height: 48px; background-color: var(--primary-yellow); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; color: #1A1C29; }
        .clear-btn { position: absolute; bottom: 30px; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; color: #ff4d4f; background: transparent; }
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; }
        .header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;}
        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr 320px; gap: 20px; }
        .card { background-color: var(--card-bg); border-radius: var(--border-radius); padding: 24px; display: flex; flex-direction: column; border: 1px solid var(--border-color);}
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-title { font-weight: bold; font-size: 16px; }
        .badge { background-color: var(--hover-bg); color: var(--text-muted); font-size: 10px; padding: 4px 10px; border-radius: 12px; font-weight: bold;}
        .cal-month { text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 18px; color: var(--text-main);}
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-head { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .cal-day { width: 30px; height: 30px; line-height: 30px; margin: 0 auto; border-radius: 50%; font-size: 14px; color: var(--text-main);}
        .cal-day.today { background: var(--hover-bg); font-weight: bold;}
        .cal-day.has-match { background: var(--primary-yellow); color: #1A1C29; font-weight: bold;}
        .cal-legend { display: flex; gap: 15px; font-size: 12px; color: var(--text-muted); margin-top: 20px; justify-content: center;}
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .list-header { display: flex; font-size: 12px; color: var(--text-muted); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
        .list-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-color); }
        .list-item:last-child { border-bottom: none; }
        .rank-num { width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; margin-right: 12px; background-color: var(--rank-bg); color: var(--rank-text);}
        .rank-num.gold { background-color: var(--primary-yellow); color: #1A1C29; }
        .rank-num.silver { background-color: #C0C0C0; color: #1A1C29; }
        .rank-num.bronze { background-color: #CD7F32; color: #fff; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; flex-shrink: 0;}
        .player-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .player-name { font-weight: 500; font-size: 14px; cursor: pointer; }
        .score-info { text-align: right; }
        .record { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
        .points { font-weight: bold; font-size: 16px; color: var(--text-main); }
        .bottom-row { grid-column: 1 / -1; display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-top: 20px;}
        .profile-carousel { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; flex: 1;}
        .nav-arrow { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-color); display: flex; justify-content: center; align-items: center; cursor: pointer; background: var(--card-bg);}
        .carousel-content { text-align: center; flex: 1; }
        .carousel-avatar { width: 70px; height: 70px; border-radius: 50%; font-size: 28px; display: flex; justify-content: center; align-items: center; color: white; margin: 0 auto 12px; }
        .carousel-stats { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .carousel-stats .val { font-size: 18px; font-weight: bold; color: var(--text-main); }
        .carousel-stats .lbl { font-size: 12px; color: var(--text-muted); }
        .btn-outline { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); font-size: 12px; cursor: pointer; }
        .match-list-container { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .match-item { background: var(--list-bg); padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary-yellow); }
        .match-players { font-weight: bold; font-size: 14px; margin-bottom: 4px;}
        .match-date { font-size: 12px; color: var(--text-muted); }
        .match-type { font-size: 10px; background: var(--border-color); color: var(--text-main); padding: 2px 6px; border-radius: 4px; margin-right: 6px;}
        .match-score { color: var(--primary-yellow); font-weight: bold; font-size: 18px; min-width: 50px; text-align: center;}
        .match-actions { display: flex; gap: 8px; margin-left: 15px; }
        .action-btn { padding: 4px 8px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; }
        .btn-edit { background: rgba(24, 144, 255, 0.1); color: #1890ff; }
        .btn-delete { background: rgba(255, 77, 79, 0.1); color: #ff4d4f; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px);}
        .modal { background: var(--modal-bg); padding: 30px; border-radius: 20px; width: 450px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border-color);}
        .modal h2 { margin-bottom: 20px; text-align: center; color: var(--text-main);}
        .type-toggle { display: flex; margin-bottom: 20px; background: var(--hover-bg); border-radius: 8px; overflow: hidden; }
        .type-toggle div { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: var(--text-muted);}
        .type-toggle div.active { background: var(--primary-yellow); color: #1A1C29; font-weight: bold; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-muted); }
        .form-group select, .form-group input { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); border-radius: 8px; font-size: 14px; }
        .team-box { background: var(--list-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-color);}
        .btn-submit { width: 100%; padding: 12px; background: var(--primary-yellow); color: #1A1C29; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        .btn-cancel { width: 100%; padding: 12px; background: transparent; color: var(--text-muted); border: none; cursor: pointer; margin-top: 5px; }
        .profile-chart-container { width: 100%; height: 250px; margin: 10px 0;}
        .season-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: var(--list-bg); border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border-color); }
        .season-badge { background: var(--primary-yellow); color: #1A1C29; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        /* 加载动画界面 */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-main); font-size: 18px; font-weight: bold; }
        .spinner { border: 4px solid var(--border-color); border-top: 4px solid var(--primary-yellow); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">正在同步云端数据...</div>
    </div>

    <aside class="sidebar">
        <div class="logo">林丹<br>宿舍杯</div>
        <div class="season-btn" onclick="openSeasonModal()" title="切换/管理赛季">
            <span class="season-year" id="sidebar-season">...</span>
            <span class="season-lbl">赛季</span>
        </div>
        <div class="nav-icon" id="theme-toggle" onclick="toggleTheme()" title="切换深夜模式">🌓</div>
        <div class="nav-icon" onclick="fetchCloudData()" title="手动同步刷新">🔄</div>
        <div class="add-btn" onclick="openMatchModal()" title="录入新比赛">+</div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div>
                <h1>羽毛球排行榜 <span style="font-size: 12px; color: #4CAF50; font-weight: normal; background: #E8F5E9; padding: 2px 8px; border-radius: 10px;">☁️ 云端同步已开启</span></h1>
                <p id="header-desc">林丹宿舍杯 · <span id="header-season" style="color:var(--primary-yellow); font-weight:bold;">加载中...</span></p>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header"><div class="card-title">🏅 单打排行榜</div><div class="badge">SINGLES</div></div>
                <div class="list-header"><span style="width:36px;">排名</span><span style="flex:1;">选手</span><span style="width:50px; text-align:right;">积分</span></div>
                <div id="singles-ranking-list" style="flex:1; overflow-y:auto;"></div>
            </div>

            <div class="card">
                <div class="card-header"><div class="card-title">👥 双打排行榜</div><div class="badge">DOUBLES</div></div>
                <div class="list-header"><span style="width:36px;">排名</span><span style="flex:1;">组合</span><span style="width:50px; text-align:right;">积分</span></div>
                <div id="doubles-ranking-list" style="flex:1; overflow-y:auto;"></div>
            </div>

            <div class="card">
                <div class="card-header" style="margin-bottom: 5px;">
                    <div class="card-title" style="font-size: 14px;">📅 赛事日历</div>
                    <div class="badge">CALENDAR</div>
                </div>
                <div id="cal-month-title" class="cal-month">加载中</div>
                <div class="cal-grid">
                    <div class="cal-head">日</div><div class="cal-head">一</div><div class="cal-head">二</div><div class="cal-head">三</div><div class="cal-head">四</div><div class="cal-head">五</div><div class="cal-head">六</div>
                </div>
                <div class="cal-grid" id="calendar-days"></div>
            </div>
            
            <div class="bottom-row">
                <div class="card">
                    <div class="card-header"><div class="card-title">👤 选手资料</div><div class="badge">PLAYERS</div></div>
                    <div class="profile-carousel">
                        <button class="nav-arrow" onclick="prevPlayer()">❮</button>
                        <div class="carousel-content">
                            <div id="carousel-avatar" class="carousel-avatar">-</div>
                            <h3 id="carousel-name">-</h3>
                            <div class="carousel-stats">
                                <div><div id="carousel-points" class="val">0</div><div class="lbl">积分</div></div>
                                <div><div id="carousel-wins" class="val">0</div><div class="lbl">胜场</div></div>
                                <div><div id="carousel-losses" class="val">0</div><div class="lbl">负场</div></div>
                            </div>
                            <button class="btn-outline" onclick="openProfileFromCarousel()">查看六边形雷达图</button>
                        </div>
                        <button class="nav-arrow" onclick="nextPlayer()">❯</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><div class="card-title">📄 比赛记录管理</div><div class="badge">HISTORY</div></div>
                    <div id="match-list" class="match-list-container"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="seasonModal">
        <div class="modal" style="width: 400px;">
            <h2>📁 赛季管理</h2>
            <div id="season-list-container" style="max-height: 200px; overflow-y:auto; margin-bottom: 20px;"></div>
            <div style="border-top: 1px dashed var(--border-color); padding-top: 20px;">
                <label style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px;">创建新赛季</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="newSeasonInput" placeholder="如: 2027" style="flex:1;">
                    <button onclick="addNewSeason()" class="btn-submit" style="margin-top:0; width:auto;">创建</button>
                </div>
            </div>
            <button class="btn-cancel" onclick="document.getElementById('seasonModal').style.display='none'">关闭</button>
        </div>
    </div>

    <div class="modal-overlay" id="matchModal">
        <div class="modal">
            <h2 id="modal-title">录入比赛</h2>
            <input type="hidden" id="editingMatchId" value="">
            <div class="type-toggle">
                <div id="tab-singles" class="active" onclick="switchMatchType('singles')">单打</div>
                <div id="tab-doubles" onclick="switchMatchType('doubles')">双打</div>
            </div>
            <div class="form-group" style="margin-bottom: 15px;"><label>日期</label><input type="date" id="matchDate"></div>
            <div class="team-box">
                <label>队伍 A</label>
                <div class="form-row">
                    <div class="form-group"><select id="playerA1" class="player-select"></select></div>
                    <div class="form-group" id="group-playerA2" style="display: none;"><select id="playerA2" class="player-select"></select></div>
                </div>
                <div class="form-group"><input type="number" id="scoreA" placeholder="A方 大比分 (如: 2)"></div>
            </div>
            <div class="team-box">
                <label>队伍 B</label>
                <div class="form-row">
                    <div class="form-group"><select id="playerB1" class="player-select"></select></div>
                    <div class="form-group" id="group-playerB2" style="display: none;"><select id="playerB2" class="player-select"></select></div>
                </div>
                <div class="form-group"><input type="number" id="scoreB" placeholder="B方 大比分 (如: 0)"></div>
            </div>
            <button class="btn-submit" onclick="submitMatch()">💾 存入云端</button>
            <button class="btn-cancel" onclick="document.getElementById('matchModal').style.display='none'">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal" style="width: 500px;">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <div id="profile-avatar" class="avatar" style="width: 56px; height: 56px; font-size: 24px;">-</div>
                <div><h2 id="profile-name" style="margin: 0;">名字</h2><div id="profile-summary" style="font-size:12px; color:var(--text-muted);">0分</div></div>
            </div>
            <div class="profile-chart-container"><canvas id="radarChart"></canvas></div>
            <button class="btn-cancel" onclick="document.getElementById('profileModal').style.display='none'">关闭</button>
        </div>
    </div>

    <script>
        // ================= ★★★ 重要配置区 ★★★ =================
        // 请把这里替换成你在 JSONBin.io 注册获取的 ID 和 Key！
        const BIN_ID = "69a506cbae596e708f56a3d8"; 
        const API_KEY = "$2a$10$kv/w2iDBM/ZKiVgjhI.3BOqYgMhuKIeEgRkv5R3ky8SFlN6wu.ARS";
        // ========================================================

        // 基础数据
        const basePlayers = [
            { id: 1, name: '龙鑫昊', avatar: '龙', color: '#FFB300', stats: [85, 75, 90, 80, 85, 70] },
            { id: 2, name: '黄玮',   avatar: '黄', color: '#4CAF50', stats: [70, 85, 80, 90, 75, 85] },
            { id: 3, name: '许力群', avatar: '许', color: '#2196F3', stats: [80, 80, 85, 85, 80, 80] },
            { id: 4, name: '林智鑫', avatar: '林', color: '#8D6E63', stats: [90, 65, 85, 75, 90, 70] }
        ];

        // 全局云端数据存储对象
        let cloudData = {
            seasons: ["2026"],
            matches: []
        };
        let currentSeason = "2026";
        let players = [];
        let doublesTeams = [];
        const POINTS_WIN = 1, POINTS_LOSS = 0; // 最新胜负规则
        let carouselIndex = 0; let myRadarChart = null;

        // ================= 云端通讯核心逻辑 =================
        async function fetchCloudData() {
            if (BIN_ID === "YOUR_BIN_ID_HERE") {
                alert("请先在代码里填入你的 BIN_ID 和 API_KEY！否则无法连接云端。");
                document.getElementById('loading-overlay').style.display = 'none';
                return;
            }

            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = "正在拉取云端数据...";
            
            try {
                let req = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                let res = await req.json();
                if (res.record) {
                    cloudData = res.record;
                    // 如果本地记过当前赛季，优先显示上次看的赛季
                    currentSeason = localStorage.getItem('ld_current_season') || cloudData.seasons[0];
                    if (!cloudData.seasons.includes(currentSeason)) currentSeason = cloudData.seasons[0];
                    renderApp();
                }
            } catch (err) {
                console.error("云同步失败:", err);
                alert("云端连接失败，请检查网络或 API Key！");
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        async function saveToCloud() {
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = "正在保存至云端...";
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(cloudData)
                });
                renderApp();
            } catch (err) {
                alert("保存失败，请重试！");
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        // ================= 业务逻辑 =================
        function computeRankings() {
            players = basePlayers.map(p => ({ ...p, wins: 0, losses: 0, points: 0 }));
            doublesTeams = [];
            // 筛选当前赛季的比赛
            const seasonMatches = cloudData.matches.filter(m => m.season === currentSeason);

            seasonMatches.forEach(m => {
                if(m.type === 'singles') {
                    const pA = players.find(p => p.id === m.teamA[0]), pB = players.find(p => p.id === m.teamB[0]);
                    if(pA && pB) {
                        if(m.scoreA > m.scoreB) { pA.wins++; pA.points+=POINTS_WIN; pB.losses++; pB.points+=POINTS_LOSS; }
                        else { pB.wins++; pB.points+=POINTS_WIN; pA.losses++; pA.points+=POINTS_LOSS; }
                    }
                } else if(m.type === 'doubles') {
                    const getTeam = (ids) => {
                        const p1 = players.find(p=>p.id===ids[0]), p2 = players.find(p=>p.id===ids[1]);
                        const tName = `${p1.name}/${p2.name}`;
                        let t = doublesTeams.find(t => t.name === tName);
                        if(!t) { t = { name: tName, wins:0, losses:0, points:0 }; doublesTeams.push(t); }
                        return t;
                    };
                    const tA = getTeam(m.teamA), tB = getTeam(m.teamB);
                    if(m.scoreA > m.scoreB) { tA.wins++; tA.points+=POINTS_WIN; tB.losses++; tB.points+=POINTS_LOSS; }
                    else { tB.wins++; tB.points+=POINTS_WIN; tA.losses++; tA.points+=POINTS_LOSS; }
                }
            });
            players.sort((a, b) => b.points !== a.points ? b.points - a.points : b.wins - a.wins);
            doublesTeams.sort((a, b) => b.points !== a.points ? b.points - a.points : b.wins - a.wins);
        }

        function renderApp() {
            computeRankings();
            document.getElementById('sidebar-season').innerText = currentSeason;
            document.getElementById('header-season').innerText = currentSeason + " 赛季";

            document.getElementById('singles-ranking-list').innerHTML = players.map((p, i) => `
                <div class="list-item"><div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
                <div class="player-info"><div class="avatar" style="background:${p.color};">${p.avatar}</div><span class="player-name" onclick="openProfileModal(${p.id})">${p.name}</span></div>
                <div class="score-info"><div class="record">${p.wins}胜${p.losses}负</div><div class="points">${p.points}</div></div></div>
            `).join('');

            document.getElementById('doubles-ranking-list').innerHTML = doublesTeams.length === 0 ? `<div style="text-align:center;color:#999;font-size:12px;padding:20px;">暂无记录</div>` :
                doublesTeams.map((t, i) => `
                <div class="list-item"><div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
                <div class="player-info"><span class="player-name">${t.name}</span></div>
                <div class="score-info"><div class="record">${t.wins}胜${t.losses}负</div><div class="points">${t.points}</div></div></div>
            `).join('');

            const seasonMatches = cloudData.matches.filter(m => m.season === currentSeason).sort((a,b)=>b.id-a.id);
            document.getElementById('match-list').innerHTML = seasonMatches.length === 0 ? `<div style="text-align:center;color:#999;font-size:12px;padding:20px;">当前赛季暂无记录</div>` :
                seasonMatches.map(m => `
                <div class="match-item"><div style="flex:1;"><div class="match-players"><span class="match-type">${m.type==='singles'?'单打':'双打'}</span>${m.teamAName} <span style="color:#aaa;">vs</span> ${m.teamBName}</div><div class="match-date">📅 ${m.date}</div></div>
                <div class="match-score">${m.scoreA} : ${m.scoreB}</div><div class="match-actions"><button class="action-btn btn-edit" onclick="editMatch(${m.id})">修改</button><button class="action-btn btn-delete" onclick="deleteMatch(${m.id})">删除</button></div></div>
            `).join('');

            updateCarousel(); renderCalendar(seasonMatches);
        }

        function renderCalendar(seasonMatches) {
            const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
            document.getElementById('cal-month-title').innerText = `${y}年 ${m + 1}月`;
            const dates = new Set();
            seasonMatches.forEach(match => { const p = match.date.split('-'); if(parseInt(p[0])===y && parseInt(p[1])===m+1) dates.add(parseInt(p[2])); });
            
            let html = ''; const fDay = new Date(y, m, 1).getDay(); const dInM = new Date(y, m+1, 0).getDate();
            for(let i=0; i<fDay; i++) html += `<div></div>`;
            for(let i=1; i<=dInM; i++) {
                html += `<div class="cal-day ${i===now.getDate()&&m===new Date().getMonth()?'today':''} ${dates.has(i)?'has-match':''}">${i}</div>`;
            }
            document.getElementById('calendar-days').innerHTML = html;
        }

        // ================= 弹窗交互与表单提交 =================
        function openSeasonModal() {
            document.getElementById('season-list-container').innerHTML = cloudData.seasons.map(s => `
                <div class="season-list-item ${s===currentSeason?'active':''}" onclick="switchSeason('${s}')"><span style="font-weight:bold;">${s} 赛季</span></div>
            `).join('');
            document.getElementById('seasonModal').style.display = 'flex';
        }
        function switchSeason(s) { currentSeason = s; localStorage.setItem('ld_current_season', s); document.getElementById('seasonModal').style.display = 'none'; renderApp(); }
        
        async function addNewSeason() {
            const newS = document.getElementById('newSeasonInput').value.trim();
            if(!newS || cloudData.seasons.includes(newS)) return alert("输入有误或已存在");
            cloudData.seasons.push(newS); currentSeason = newS;
            document.getElementById('seasonModal').style.display = 'none';
            await saveToCloud();
        }

        async function submitMatch() {
            const editId = document.getElementById('editingMatchId').value;
            const type = document.getElementById('tab-doubles').className === 'active' ? 'doubles' : 'singles';
            const date = document.getElementById('matchDate').value;
            const scoreA = parseInt(document.getElementById('scoreA').value), scoreB = parseInt(document.getElementById('scoreB').value);
            if(isNaN(scoreA)||isNaN(scoreB)) return alert("比分不完整");

            let teamA = [], teamB = [], tAName = "", tBName = "";
            if(type === 'singles') {
                const idA = parseInt(document.getElementById('playerA1').value), idB = parseInt(document.getElementById('playerB1').value);
                if(idA===idB) return alert("不能打自己");
                teamA=[idA]; teamB=[idB];
                tAName=basePlayers.find(p=>p.id===idA).name; tBName=basePlayers.find(p=>p.id===idB).name;
            } else {
                const ids = [parseInt(document.getElementById('playerA1').value), parseInt(document.getElementById('playerA2').value), parseInt(document.getElementById('playerB1').value), parseInt(document.getElementById('playerB2').value)];
                if(new Set(ids).size!==4) return alert("选4个不同的人");
                teamA=[ids[0],ids[1]].sort(); teamB=[ids[2],ids[3]].sort();
                tAName=`${basePlayers.find(p=>p.id===teamA[0]).name}/${basePlayers.find(p=>p.id===teamA[1]).name}`;
                tBName=`${basePlayers.find(p=>p.id===teamB[0]).name}/${basePlayers.find(p=>p.id===teamB[1]).name}`;
            }

            const matchData = { id: editId ? parseInt(editId) : Date.now(), season: currentSeason, type, date, scoreA, scoreB, teamA, teamB, teamAName: tAName, teamBName: tBName };
            if(editId) cloudData.matches[cloudData.matches.findIndex(m=>m.id===parseInt(editId))] = matchData;
            else cloudData.matches.push(matchData);

            document.getElementById('matchModal').style.display='none';
            await saveToCloud();
        }

        async function deleteMatch(id) {
            if(confirm("确定删除且同步云端吗？")) {
                cloudData.matches = cloudData.matches.filter(m => m.id !== id);
                await saveToCloud();
            }
        }

        function editMatch(id) {
            const m = cloudData.matches.find(x => x.id === id);
            document.getElementById('editingMatchId').value = m.id;
            document.getElementById('matchDate').value = m.date;
            document.getElementById('scoreA').value = m.scoreA; document.getElementById('scoreB').value = m.scoreB;
            switchMatchType(m.type);
            document.getElementById('playerA1').value = m.teamA[0]; document.getElementById('playerB1').value = m.teamB[0];
            if(m.type==='doubles') { document.getElementById('playerA2').value = m.teamA[1]; document.getElementById('playerB2').value = m.teamB[1]; }
            document.getElementById('matchModal').style.display = 'flex';
        }

        // ================= 辅助函数与初始化 =================
        function initSelects() { document.querySelectorAll('.player-select').forEach(sel => sel.innerHTML = basePlayers.map(p => `<option value="${p.id}">${p.name}</option>`).join('')); }
        function switchMatchType(type) { document.getElementById('tab-singles').className = type==='singles'?'active':''; document.getElementById('tab-doubles').className = type==='doubles'?'active':''; const d = type==='doubles'?'block':'none'; document.getElementById('group-playerA2').style.display = d; document.getElementById('group-playerB2').style.display = d; }
        function openMatchModal() { document.getElementById('editingMatchId').value=""; document.getElementById('scoreA').value=""; document.getElementById('scoreB').value=""; document.getElementById('matchDate').valueAsDate=new Date(); switchMatchType('singles'); document.getElementById('playerB1').selectedIndex=1; document.getElementById('matchModal').style.display='flex'; }
        
        function updateCarousel() { if(players.length===0)return; const p = players[carouselIndex]; document.getElementById('carousel-avatar').innerText = p.avatar; document.getElementById('carousel-avatar').style.background = p.color; document.getElementById('carousel-name').innerText = p.name; document.getElementById('carousel-points').innerText = p.points; document.getElementById('carousel-wins').innerText = p.wins; document.getElementById('carousel-losses').innerText = p.losses; }
        function prevPlayer() { carouselIndex = (carouselIndex - 1 + players.length) % players.length; updateCarousel(); }
        function nextPlayer() { carouselIndex = (carouselIndex + 1) % players.length; updateCarousel(); }
        function openProfileFromCarousel() { openProfileModal(players[carouselIndex].id); }
        
        function openProfileModal(id) { const p = players.find(x=>x.id===id); document.getElementById('profile-avatar').innerText=p.avatar; document.getElementById('profile-avatar').style.background=p.color; document.getElementById('profile-name').innerText=p.name; document.getElementById('profile-summary').innerText=`当前赛季: ${p.points}分 | ${p.wins}胜 ${p.losses}负`; renderRadarChart(p); document.getElementById('profileModal').style.display='flex'; }
        function renderRadarChart(p) { const ctx = document.getElementById('radarChart').getContext('2d'); if(myRadarChart) myRadarChart.destroy(); const isDark = document.documentElement.getAttribute('data-theme')==='dark'; const gColor = isDark?'#444':'#EAEAEA'; const hToR = (hex) => `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`; myRadarChart = new Chart(ctx, { type: 'radar', data: { labels: ['进攻', '防守', '速度', '体能', '技巧', '心态'], datasets: [{ label: '能力', data: p.stats, backgroundColor: `rgba(${hToR(p.color)}, 0.2)`, borderColor: p.color, pointBackgroundColor: p.color }] }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: gColor }, angleLines: { color: gColor }, pointLabels: { color: isDark?'#AAA':'#555' } } }, plugins: { legend: { display: false } } } }); }

        function toggleTheme() { const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('ld_theme', t); document.documentElement.style.setProperty('--icon-invert', t==='dark'?'1':'0'); if(document.getElementById('profileModal').style.display==='flex') openProfileModal(players.find(x=>x.name===document.getElementById('profile-name').innerText).id); }

        window.onload = () => { 
            const t = localStorage.getItem('ld_theme')||'light'; document.documentElement.setAttribute('data-theme', t); document.documentElement.style.setProperty('--icon-invert', t==='dark'?'1':'0');
            initSelects(); 
            fetchCloudData(); // 打开网页自动拉取云端！
        };
    </script>
</body>
</html>
